services:
  db:
    image: postgres:16-alpine
    container_name: poc-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: poc_user
      POSTGRES_PASSWORD: poc_recordweb
      POSTGRES_DB: poc_db
    volumes:
      - poc_db_data:/var/lib/postgresql/data
    networks:
      - poc_network

  api:
    build: ./apps/fragestunde-web/backend
    container_name: poc-api
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PGHOST: db
      PGUSER: poc_user
      PGPASSWORD: poc_recordweb
      PGDATABASE: poc_db
    networks:
      - poc_network


  nginx:
    image: nginx:alpine
    container_name: poc-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./apps:/usr/share/nginx/html/apps:ro
    networks:
      - poc_network

networks:
  poc_network:
    driver: bridge

volumes:
  poc_db_data:
