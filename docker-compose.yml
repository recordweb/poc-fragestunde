services:
  db:
    image: postgres:16-alpine
    container_name: poc-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: poc_user
      POSTGRES_PASSWORD: poc_recordweb
      POSTGRES_DB: poc_db
    volumes:
      - poc_db_data:/var/lib/postgresql/data
    networks:
      - poc_network

  api:
    build:
      context: .
      dockerfile: apps/fragenmanagement/backend/Dockerfile
    container_name: poc-api
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PGHOST: db
      PGUSER: poc_user
      PGPASSWORD: poc_recordweb
      PGDATABASE: poc_db
      PUBLIC_BASE_URL: https://vps.recordweb.dev
    volumes:
      - ./schemas:/app/schemas:ro
    networks:
      - poc_network

  resolver-parlament:
    build:
      context: ./apps/resolver
    container_name: poc-resolver-parlament
    restart: unless-stopped
    environment:
      PORT: 3000
    volumes:
      - ./apps/resolver/parlament/org.json:/app/org.json:ro
      - resolver_parlament_data:/app/data
    networks:
      - poc_network

  resolver-bk:
    build:
      context: ./apps/resolver
    container_name: poc-resolver-bk
    restart: unless-stopped
    environment:
      PORT: 3000
    volumes:
      - ./apps/resolver/bk/org.json:/app/org.json:ro
      - resolver_bk_data:/app/data
    networks:
      - poc_network

  nginx:
    image: nginx:alpine
    container_name: poc-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./apps:/usr/share/nginx/html/apps:ro
    networks:
      - poc_network
    depends_on:
      - resolver-parlament
      - resolver-bk
      
networks:
  poc_network:
    driver: bridge

volumes:
  poc_db_data:
  resolver_parlament_data:
  resolver_bk_data: